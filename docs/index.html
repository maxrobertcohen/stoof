<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Worm Apple</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0d0d0d;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Splash screen ── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      z-index: 10;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash-image {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    #splash-label {
      margin-top: 2rem;
      color: #d4c9b0;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      font-style: italic;
      text-align: center;
      line-height: 1.7;
      padding: 0 2rem;
      animation: pulse 3s ease-in-out infinite;
    }

    #splash-audio-hint {
      margin-top: 0.6rem;
      color: #d4c9b0;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      opacity: 0.35;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.85; }
    }

    /* ── Pages ── */
    #book {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    .page img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      display: block;
    }

    /* ── Dot indicators ── */
    #dots {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      z-index: 5;
      pointer-events: none;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      transition: background 0.4s ease, transform 0.4s ease;
    }

    .dot.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.4);
    }

    /* ── Tap zones ── */
    #tap-zones {
      position: fixed;
      inset: 0;
      display: flex;
      z-index: 4;
    }

    #tap-prev { flex: 1; cursor: default; }
    #tap-next { flex: 1; cursor: default; }
  </style>
</head>
<body>

<div id="splash">
  <img id="splash-image" src="images/cover.jpeg" alt="">
  <p id="splash-label">Tap on the right side to crawl in,<br>tap on the left to crawl back.</p>
  <p id="splash-audio-hint">(turn on audio)</p>
</div>

<div id="book"></div>
<div id="dots"></div>

<div id="tap-zones">
  <div id="tap-prev"></div>
  <div id="tap-next"></div>
</div>

<script>
  // ─── Configuration ────────────────────────────────────────────────────────────
  //
  //  Add or remove entries to match your drawings.
  //  sound: is optional — leave it null if you don't have a sfx for that page.
  //
  const PAGES = [
    { image: 'images/page-1.jpeg',  sound: 'sounds/Page%201.m4a'  },
    { image: 'images/page-2.jpeg',  sound: 'sounds/Page%202.m4a'  },
    { image: 'images/page-3.jpeg',  sound: 'sounds/Page%203.m4a'  },
    { image: 'images/page-4.jpeg',  sound: 'sounds/Page%204.m4a'  },
    { image: 'images/page-5.jpeg',  sound: 'sounds/Page%205.m4a'  },
    { image: 'images/page-6.jpeg',  sound: 'sounds/Page%206.m4a'  },
    { image: 'images/page-7.jpeg',  sound: 'sounds/Page%207.m4a'  },
    { image: 'images/page-8.jpeg',  sound: 'sounds/Page%208.m4a'  },
    { image: 'images/page-9.jpeg',  sound: 'sounds/Page%209.m4a'  },
    { image: 'images/page-10.jpeg', sound: 'sounds/Page%2010.m4a' },
  ];

  const BACKGROUND_MUSIC = 'music/Wormmusic.m4a';
  const COVER_NARRATION  = 'sounds/Cover.m4a';
  const MUSIC_VOLUME     = 0.33;   // 0.0 – 1.0
  const SFX_VOLUME       = 0.8;    // 0.0 – 1.0
  // ─────────────────────────────────────────────────────────────────────────────

  let current          = 0;
  let onCover          = true;
  let bgMusic          = null;
  let currentNarration = null;
  const sfxCache = {};

  // Build page elements
  const bookEl = document.getElementById('book');
  const dotsEl = document.getElementById('dots');

  PAGES.forEach((p, i) => {
    // Page div
    const div = document.createElement('div');
    div.className = 'page' + (i === 0 ? ' active' : '');

    const img = document.createElement('img');
    img.src = p.image;
    img.draggable = false;
    img.alt = '';
    div.appendChild(img);
    bookEl.appendChild(div);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);

    // Preload sound effect if provided
    if (p.sound) {
      const sfx = new Audio();
      sfx.preload = 'auto';
      sfx.volume  = SFX_VOLUME;
      sfx.src     = p.sound;
      sfxCache[i] = sfx;
    }
  });

  // Navigate to a page
  function goTo(index) {
    if (index >= PAGES.length) return;

    // Tapping left on page 1 goes back to cover
    if (index < 0) {
      goToCover();
      return;
    }

    const pages = bookEl.querySelectorAll('.page');
    const dots  = dotsEl.querySelectorAll('.dot');

    if (!onCover) {
      pages[current].classList.remove('active');
      dots[current].classList.remove('active');
    }

    if (onCover) document.getElementById('splash').classList.add('fade-out');
    onCover  = false;
    current  = index;

    pages[current].classList.add('active');
    dots[current].classList.add('active');

    playNarration(current);
  }

  function goToCover() {
    const pages = bookEl.querySelectorAll('.page');
    const dots  = dotsEl.querySelectorAll('.dot');
    pages[current].classList.remove('active');
    dots[current].classList.remove('active');
    onCover = true;
    document.getElementById('splash').classList.remove('fade-out');
    // Stop current narration
    if (currentNarration) {
      currentNarration.pause();
      currentNarration.currentTime = 0;
    }
    // Create fresh audio in direct response to tap (most reliable on iOS)
    const cover = new Audio(COVER_NARRATION);
    cover.volume = SFX_VOLUME;
    currentNarration = cover;
    cover.play().catch(() => {});
  }

  function playNarration(index) {
    // Stop whatever is currently narrating
    if (currentNarration) {
      currentNarration.pause();
      currentNarration.currentTime = 0;
    }
    const sfx = sfxCache[index];
    if (!sfx) return;
    sfx.currentTime = 0;
    currentNarration = sfx;
    sfx.play().catch(() => {/* file missing or blocked — silent */});
  }

  let musicStarted = false;
  let audioCtx     = null;
  let audioBuffer  = null;
  const CROSSFADE  = 6;

  async function startMusic() {
    if (musicStarted) return;
    musicStarted = true;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // Master volume node — single place to control loudness
    const master = audioCtx.createGain();
    master.gain.value = MUSIC_VOLUME;
    master.connect(audioCtx.destination);

    const response    = await fetch(BACKGROUND_MUSIC);
    const arrayBuffer = await response.arrayBuffer();
    audioBuffer       = await audioCtx.decodeAudioData(arrayBuffer);

    scheduleLoop(audioCtx.currentTime + 0.1, 0, master);
  }

  function scheduleLoop(startAt, fadeIn, master) {
    if (!audioCtx || !audioBuffer) return;

    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;

    const gain = audioCtx.createGain();
    source.connect(gain);
    gain.connect(master);

    // Fade in from 0 to 1 (master handles overall volume)
    gain.gain.setValueAtTime(0, startAt);
    gain.gain.linearRampToValueAtTime(1, startAt + Math.max(fadeIn, 0.05));

    source.start(startAt);

    // Fade out near end
    const xfadeAt = startAt + audioBuffer.duration - CROSSFADE;
    gain.gain.setValueAtTime(1, xfadeAt);
    gain.gain.linearRampToValueAtTime(0, xfadeAt + CROSSFADE);
    source.stop(startAt + audioBuffer.duration);

    // Schedule next loop
    const msUntilNext = Math.max(0, (xfadeAt - audioCtx.currentTime - 0.2) * 1000);
    setTimeout(() => scheduleLoop(xfadeAt, CROSSFADE, master), msUntilNext);
  }

  // Splash tap — starts music and goes to page 1
  const splash = document.getElementById('splash');
  splash.addEventListener('click', () => {
    startMusic();
    goTo(0);
  });

  // Tap left / tap right
  document.getElementById('tap-prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('tap-next').addEventListener('click', () => goTo(current + 1));

  // Swipe (mobile)
  let touchStartX = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      dx < 0 ? goTo(current + 1) : goTo(current - 1);
    }
  }, { passive: true });

  // Keyboard (desktop / dev)
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') goTo(current + 1);
    if (e.key === 'ArrowLeft')                   goTo(current - 1);
  });
</script>
</body>
</html>
